<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Tree — Architect's Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #08101f;
        --orb1: rgba(0, 122, 255, 0.26);
        --orb2: rgba(10, 180, 255, 0.14);
        --orb3: rgba(88, 50, 230, 0.11);
        --glass: rgba(255, 255, 255, 0.055);
        --glass-hov: rgba(255, 255, 255, 0.085);
        --glass-act: rgba(0, 122, 255, 0.1);
        --border: rgba(255, 255, 255, 0.095);
        --border-hi: rgba(255, 255, 255, 0.18);
        --border-act: rgba(0, 122, 255, 0.4);
        --shine: rgba(255, 255, 255, 0.055);
        --blur: blur(24px) saturate(180%);
        --blur-hvy: blur(40px) saturate(200%);
        --blue: #007aff;
        --blue2: #40aaff;
        --cyan: #32ade6;
        --green: #30d158;
        --yellow: #ffd60a;
        --red: #ff453a;
        --t1: rgba(255, 255, 255, 0.94);
        --t2: rgba(255, 255, 255, 0.52);
        --t3: rgba(255, 255, 255, 0.24);
        --sw: 290px;
        --hh: 60px;
        --r1: 20px;
        --r2: 14px;
        --r3: 10px;
      }
      html.light {
        --bg: #f0f5fd;
        --orb1: rgba(0, 122, 255, 0.1);
        --orb2: rgba(10, 180, 255, 0.07);
        --orb3: rgba(88, 50, 230, 0.06);
        --glass: rgba(255, 255, 255, 0.65);
        --glass-hov: rgba(255, 255, 255, 0.8);
        --glass-act: rgba(0, 122, 255, 0.07);
        --border: rgba(0, 0, 0, 0.07);
        --border-hi: rgba(0, 0, 0, 0.13);
        --border-act: rgba(0, 122, 255, 0.32);
        --shine: rgba(255, 255, 255, 0.55);
        --t1: rgba(0, 0, 0, 0.9);
        --t2: rgba(0, 0, 0, 0.48);
        --t3: rgba(0, 0, 0, 0.26);
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--t1);
        font-family:
          "DM Sans",
          -apple-system,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* BG */
      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 80% 60% at 10% 20%,
            var(--orb1),
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 50% at 85% 70%,
            var(--orb2),
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 60% at 50% 95%,
            var(--orb3),
            transparent 60%
          ),
          var(--bg);
      }
      #grain {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.022;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 128px 128px;
      }

      /* GLASS SURFACE */
      .gs {
        background: var(--glass);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border: 1px solid var(--border);
        position: relative;
      }
      .gs::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, var(--shine) 0%, transparent 50%);
        pointer-events: none;
      }

      /* =========================
   LOGIN
========================= */
      #loginScreen {
        position: fixed;
        inset: 0;
        z-index: 9000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lw {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        animation: lfi 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes lfi {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .licon {
        width: 76px;
        height: 76px;
        border-radius: 22px;
        background: var(--glass);
        backdrop-filter: var(--blur-hvy);
        -webkit-backdrop-filter: var(--blur-hvy);
        border: 1px solid var(--border-hi);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
      }
      .licon svg {
        width: 32px;
        height: 32px;
        stroke: var(--blue2);
        fill: none;
        stroke-width: 1.5;
      }
      .lcard {
        width: 350px;
        background: var(--glass);
        backdrop-filter: var(--blur-hvy);
        -webkit-backdrop-filter: var(--blur-hvy);
        border: 1px solid var(--border-hi);
        border-radius: var(--r1);
        padding: 34px 30px;
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.38),
          0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
        display: flex;
        flex-direction: column;
        gap: 18px;
        position: relative;
      }
      .lcard::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: var(--r1);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.07) 0%,
          transparent 45%
        );
        pointer-events: none;
      }
      .lt1 {
        font-size: 21px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }
      .lt2 {
        font-size: 12.5px;
        color: var(--t2);
        margin-top: 2px;
      }
      .llb {
        font-size: 11.5px;
        font-weight: 500;
        color: var(--t2);
      }
      .linput {
        width: 100%;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--border);
        border-radius: var(--r3);
        padding: 12px 16px;
        color: var(--t1);
        font-family: "DM Mono", monospace;
        font-size: 16px;
        letter-spacing: 6px;
        text-align: center;
        outline: none;
        transition: all 0.2s;
      }
      .linput:focus {
        background: rgba(0, 122, 255, 0.08);
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.18);
      }
      .linput::placeholder {
        letter-spacing: 3px;
        opacity: 0.3;
      }
      .lbtn {
        width: 100%;
        padding: 13px;
        background: var(--blue);
        border: none;
        border-radius: var(--r3);
        color: #fff;
        font-family: "DM Sans", sans-serif;
        font-size: 14.5px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 22px rgba(0, 122, 255, 0.38);
        transition: all 0.18s;
        position: relative;
        overflow: hidden;
      }
      .lbtn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.14) 0%,
          transparent 100%
        );
      }
      .lbtn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 30px rgba(0, 122, 255, 0.48);
      }
      .lerr {
        font-size: 11.5px;
        color: var(--red);
        min-height: 14px;
        text-align: center;
        font-family: "DM Mono", monospace;
      }

      /* =========================
   APP
========================= */
      #app {
        display: none;
        position: relative;
        z-index: 2;
        min-height: 100vh;
      }

      /* HEADER */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--hh);
        background: var(--glass);
        backdrop-filter: var(--blur-hvy);
        -webkit-backdrop-filter: var(--blur-hvy);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .bdot {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.38);
      }
      .bdot svg {
        width: 15px;
        height: 15px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
      }
      .bname {
        font-size: 14.5px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }
      .bname em {
        color: var(--t2);
        font-style: normal;
        font-weight: 400;
      }
      .hr {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 13px;
        font-size: 11.5px;
        color: var(--t2);
        font-family: "DM Mono", monospace;
      }
      .pill-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--blue);
      }
      .hb {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: var(--r3);
        padding: 6px 13px;
        color: var(--t2);
        font-family: "DM Sans", sans-serif;
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.16s;
        white-space: nowrap;
      }
      .hb:hover {
        background: var(--glass-hov);
        border-color: var(--border-hi);
        color: var(--t1);
      }
      .hb.acc {
        background: rgba(0, 122, 255, 0.14);
        border-color: rgba(0, 122, 255, 0.28);
        color: var(--blue2);
      }
      .hb.acc:hover {
        background: rgba(0, 122, 255, 0.2);
      }
      .ham {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        flex-direction: column;
        gap: 4.5px;
      }
      .ham span {
        display: block;
        width: 18px;
        height: 1.5px;
        background: var(--t2);
        border-radius: 2px;
      }

      /* LAYOUT */
      #layout {
        display: flex;
        height: calc(100vh - var(--hh));
      }

      /* SIDEBAR */
      #sidebar {
        width: var(--sw);
        min-width: var(--sw);
        background: var(--glass);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 14px 10px;
        height: 100%;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
      }
      #sidebar::-webkit-scrollbar {
        width: 3px;
      }
      #sidebar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
      }
      .slbl {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--t3);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        padding: 8px 12px 5px;
        display: block;
      }
      .si {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 11px;
        border-radius: var(--r3);
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.16s;
        margin-bottom: 1px;
      }
      .si:hover {
        background: var(--glass-hov);
        border-color: var(--border);
      }
      .si.on {
        background: var(--glass-act);
        border-color: var(--border-act);
      }
      .sinum {
        font-size: 10.5px;
        font-family: "DM Mono", monospace;
        color: var(--t3);
        width: 18px;
        flex-shrink: 0;
      }
      .siname {
        flex: 1;
        font-size: 12px;
        font-weight: 500;
        color: var(--t2);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .si.on .siname {
        color: var(--blue2);
      }
      .sibar {
        width: 32px;
        height: 2.5px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .sibar-f {
        height: 100%;
        background: var(--blue);
        border-radius: 2px;
        transition: width 0.4s;
      }
      .sipct {
        font-size: 9.5px;
        font-family: "DM Mono", monospace;
        color: var(--t3);
        width: 24px;
        text-align: right;
        flex-shrink: 0;
      }

      /* Módulo em destaque */
      .si-hl {
        background: rgba(0, 122, 255, 0.1);
        border-color: rgba(0, 122, 255, 0.32) !important;
        margin-bottom: 2px;
      }
      .si-hl .siname {
        color: var(--blue2) !important;
      }
      .si-hl .sinum {
        color: var(--blue2);
      }
      .si-hl .sibar-f {
        background: var(--cyan);
      }
      .si-hl .sipct {
        color: var(--blue2);
      }

      /* Botão retrátil da seção "Outros Módulos" */
      .sib-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px 12px 5px;
        font-size: 10.5px;
        font-weight: 500;
        color: var(--t3);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        font-family: "DM Sans", sans-serif;
        transition: color 0.15s;
      }
      .sib-toggle:hover {
        color: var(--t2);
      }
      .sib-chv {
        width: 12px;
        height: 12px;
        transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        flex-shrink: 0;
      }
      .sib-toggle.collapsed .sib-chv {
        transform: rotate(-90deg);
      }

      /* MAIN */
      #main {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 28px 32px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
      }
      #main::-webkit-scrollbar {
        width: 3px;
      }
      #main::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
      }

      /* STATS */
      .srow {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 11px;
        margin-bottom: 22px;
      }
      .sc {
        background: var(--glass);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border: 1px solid var(--border);
        border-radius: var(--r2);
        padding: 16px 18px;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .sc::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, var(--shine) 0%, transparent 50%);
        pointer-events: none;
      }
      .sc:hover {
        border-color: var(--border-hi);
        transform: translateY(-1px);
      }
      .sv {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -1px;
        color: var(--blue2);
      }
      .sl {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-top: 3px;
      }

      /* PROGRESS BAR */
      .pt {
        height: 2.5px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 26px;
      }
      .pf {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--blue),
          var(--cyan),
          var(--green)
        );
        border-radius: 2px;
        transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 0 6px rgba(0, 122, 255, 0.4);
      }

      /* MODULE CARDS */
      .ml {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .mc {
        background: var(--glass);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border: 1px solid var(--border);
        border-radius: var(--r1);
        overflow: hidden;
        transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }
      .mc::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2.5px;
        background: transparent;
        border-radius: 3px 0 0 3px;
        transition: background 0.3s;
      }
      .mc:hover {
        border-color: var(--border-hi);
      }
      .mc.open {
        border-color: rgba(0, 122, 255, 0.22);
      }
      .mc.open::after {
        background: linear-gradient(180deg, var(--blue), var(--cyan));
      }

      .mhd {
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 15px 19px;
        cursor: pointer;
        transition: background 0.14s;
        user-select: none;
      }
      .mhd:hover {
        background: rgba(255, 255, 255, 0.025);
      }
      .mnb {
        width: 38px;
        height: 38px;
        flex-shrink: 0;
        border-radius: 10px;
        background: rgba(0, 122, 255, 0.1);
        border: 1px solid rgba(0, 122, 255, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        color: var(--blue2);
      }
      .mt {
        flex: 1;
        min-width: 0;
      }
      .mt1 {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--t1);
        letter-spacing: -0.2px;
      }
      .mt2 {
        font-size: 11.5px;
        color: var(--t2);
        margin-top: 1px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rw {
        position: relative;
        width: 42px;
        height: 42px;
        flex-shrink: 0;
      }
      .rw svg {
        transform: rotate(-90deg);
        display: block;
      }
      .rt {
        fill: none;
        stroke: rgba(255, 255, 255, 0.07);
        stroke-width: 2.5;
      }
      .rf {
        fill: none;
        stroke: var(--blue2);
        stroke-width: 2.5;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .rl {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Mono", monospace;
        font-size: 9px;
        color: var(--blue2);
      }
      .chv {
        width: 17px;
        height: 17px;
        flex-shrink: 0;
        color: var(--t3);
        transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .mc.open .chv {
        transform: rotate(180deg);
      }

      /* BODY */
      .mb {
        border-top: 1px solid var(--border);
        display: none;
        animation: br 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes br {
        from {
          opacity: 0;
          transform: translateY(-5px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .mc.open .mb {
        display: block;
      }

      /* TABS */
      .tbar {
        display: flex;
        border-bottom: 1px solid var(--border);
        padding: 0 19px;
      }
      .tp {
        padding: 9px 14px;
        font-size: 11.5px;
        font-weight: 500;
        color: var(--t3);
        border: none;
        background: none;
        cursor: pointer;
        border-bottom: 1.5px solid transparent;
        transition: all 0.14s;
        font-family: "DM Sans", sans-serif;
      }
      .tp:hover {
        color: var(--t2);
      }
      .tp.on {
        color: var(--blue2);
        border-bottom-color: var(--blue);
      }
      .tpane {
        display: none;
        padding: 17px 19px;
      }
      .tpane.on {
        display: block;
      }

      /* TOPICS */
      .tg {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .tr {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid rgba(255, 255, 255, 0.055);
        border-radius: var(--r3);
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
        overflow: hidden;
      }
      .tr::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(0, 122, 255, 0.05) 0%,
          transparent 100%
        );
        opacity: 0;
        transition: opacity 0.18s;
      }
      .tr:hover {
        border-color: rgba(255, 255, 255, 0.11);
        background: rgba(255, 255, 255, 0.04);
      }
      .tr:hover::before {
        opacity: 1;
      }
      .tr[data-s="done"] {

        content: "";
        position: absolute;
        inset: 0;

      /* ================================================
   HELPERS
================================================ */
      function tkey(m, i) {
        return `m${m}_t${i}`;
      }
      function tstat(m, i) {
        return S.ts[tkey(m, i)] || "pending";
      }
      function mpct(mId, len) {
        if (!len) return 0;
        let d = 0;
        for (let i = 0; i < len; i++) if (tstat(mId, i) === "done") d++;
        return Math.round((d / len) * 100);
      }
      function gstats() {
        let tot = 0,
          done = 0,
          studying = 0;
        S.mods.forEach((m) =>
          m.topics.forEach((_, i) => {
            tot++;
            const s = tstat(m.id, i);
            if (s === "done") done++;
            else if (s === "studying") studying++;
          }),
        );
        return {
          tot,
          done,
          studying,
          pct: tot ? Math.round((done / tot) * 100) : 0,
        };
      }
      const CIRC = 2 * Math.PI * 17;

      /* ================================================
   RENDER
================================================ */
      function renderAll() {
        renderMods();
        renderSidebar();
        updateStats();
      }

      function renderMods() {
        const ml = document.getElementById("ml");
        ml.innerHTML = "";
        S.mods.forEach((m, i) => {
          if (i > 0) {
            const c = document.createElement("div");
            c.className = "mcon";
            ml.appendChild(c);
          }
          const el = buildCard(m);
          el.style.animationDelay = i * 0.04 + "s";
          ml.appendChild(el);
        });
      }

      function buildCard(m) {
        const pct = mpct(m.id, m.topics.length);
        const off = (CIRC - (CIRC * pct) / 100).toFixed(1);
        const d = document.createElement("div");
        d.className = "mc ani";
        d.id = `mc-${m.id}`;
        d.innerHTML = `
    <div class="mhd" onclick="toggleCard(${m.id})">
      <div class="mnb">M${m.id}</div>
      <div class="mt"><div class="mt1">${m.title}</div><div class="mt2">${m.focus}</div></div>
      <div class="rw">
        <svg width="42" height="42" viewBox="0 0 42 42">
          <circle class="rt" cx="21" cy="21" r="17"/>
          <circle class="rf" id="rf-${m.id}" cx="21" cy="21" r="17" stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="rl" id="rl-${m.id}">${pct}%</div>
      </div>
      <svg class="chv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="mb">
      <div class="tbar">
        <button class="tp on" onclick="swTab(event,${m.id},'topics')">Tópicos</button>
        <button class="tp" onclick="swTab(event,${m.id},'tools')">Ferramentas</button>
        <button class="tp" onclick="swTab(event,${m.id},'books')">Fontes</button>
        <button class="tp" onclick="swTab(event,${m.id},'dod')">DoD</button>
      </div>
      <div class="tpane on" id="tp-${m.id}-topics">
        <div class="tg" id="tg-${m.id}">${m.topics.map((t, i) => trow(m.id, i, t)).join("")}</div>
        <div class="ta">
          <button class="ab" onclick="addTopic(${m.id})">+ Tópico</button>
          <button class="ab danger" onclick="delMod(${m.id})">Remover módulo</button>
        </div>
      </div>
      <div class="tpane" id="tp-${m.id}-tools"><div class="cc">${m.tools.map((t) => `<span class="ch">${t}</span>`).join("")}</div></div>
      <div class="tpane" id="tp-${m.id}-books"><div class="cc">${m.books.map((b) => `<span class="ch" style="font-size:11px">${b}</span>`).join("")}</div></div>
      <div class="tpane" id="tp-${m.id}-dod">
        <div class="dod">
          <div class="dodh">// Definição de Pronto</div>
          <div class="dodl">${m.dod.map((d) => `<div class="dodli"><span>→</span><span>${d}</span></div>`).join("")}</div>
          ${m.dodQuote ? `<div class="dodq">"${m.dodQuote}"</div>` : ""}
        </div>
      </div>
    </div>`;
        return d;
      }

      function trow(mId, idx, text) {
        const s = tstat(mId, idx);
        const ico =
          s === "done"
            ? `<svg viewBox="0 0 12 12"><polyline points="1,6 5,10 11,2" stroke="white" stroke-width="2.5" fill="none"/></svg>`
            : s === "studying"
              ? `<div class="sdot"></div>`
              : "";
        return `<div class="tr" data-s="${s}" id="tr-${mId}-${idx}" onclick="cyc(${mId},${idx})"><div class="tcb">${ico}</div><div class="tn">${text}</div><span class="stag stag-${s}">${s === "pending" ? "pendente" : s === "studying" ? "estudando" : "concluído"}</span></div>`;
      }

      function cyc(mId, idx) {
        const cur = tstat(mId, idx);
        S.ts[tkey(mId, idx)] =
          cur === "pending"
            ? "studying"
            : cur === "studying"
              ? "done"
              : "pending";
        saveS();
        const row = document.getElementById(`tr-${mId}-${idx}`);
        if (row) {
          const mod = S.mods.find((m) => m.id === mId);
          const tmp = document.createElement("div");
          tmp.innerHTML = trow(mId, idx, mod.topics[idx]);
          row.replaceWith(tmp.firstElementChild);
        }
        updRing(mId);
        updateStats();
        updSib(mId);
      }

      function updRing(mId) {
        const mod = S.mods.find((m) => m.id === mId);
        if (!mod) return;
        const pct = mpct(mId, mod.topics.length);
        const rf = document.getElementById(`rf-${mId}`);
        const rl = document.getElementById(`rl-${mId}`);
        if (rf)
          rf.setAttribute(
            "stroke-dashoffset",
            (CIRC - (CIRC * pct) / 100).toFixed(1),
          );
        if (rl) rl.textContent = pct + "%";
      }

      function updateStats() {
        const g = gstats();
        document.getElementById("hpill").textContent = `${g.done} / ${g.tot}`;
        document.getElementById("pf").style.width = g.pct + "%";
        document.getElementById("srow").innerHTML = `
    <div class="sc ani"><div class="sv">${S.mods.length}</div><div class="sl">Módulos</div></div>
    <div class="sc ani"><div class="sv" style="color:var(--green)">${g.done}</div><div class="sl">Concluídos</div></div>
    <div class="sc ani"><div class="sv" style="color:var(--yellow)">${g.studying}</div><div class="sl">Estudando</div></div>
    <div class="sc ani"><div class="sv">${g.pct}%</div><div class="sl">Progresso</div></div>`;
      }

      function renderSidebar() {
        // Determina o módulo em destaque: o que tem tópico em 'studying', ou M0
        const activeMod =
          S.mods.find((m) =>
            m.topics.some((_, i) => tstat(m.id, i) === "studying"),
          ) || S.mods[0];

        // Renderiza destaque
        const dest = document.getElementById("sib-destaque");
        dest.innerHTML = "";
        if (activeMod) {
          const pct = mpct(activeMod.id, activeMod.topics.length);
          const label = dest.appendChild(document.createElement("span"));
          label.className = "slbl";
          label.textContent = "Em Andamento";
          const d = document.createElement("div");
          d.className = "si si-hl";
          d.id = `sib-${activeMod.id}`;
          d.innerHTML = `<span class="sinum">M${activeMod.id}</span><span class="siname">${activeMod.title}</span><div class="sibar"><div class="sibar-f" style="width:${pct}%"></div></div><span class="sipct">${pct}%</span>`;
          d.onclick = () => {
            scrollToMod(activeMod.id);
            closeSidebar();
          };
          dest.appendChild(d);
        }

        // Renderiza outros
        const nav = document.getElementById("sibnav");
        nav.innerHTML = "";
        S.mods.forEach((m) => {
          if (activeMod && m.id === activeMod.id) return; // pula o em destaque
          const pct = mpct(m.id, m.topics.length);
          const d = document.createElement("div");
          d.className = "si";
          d.id = `sib-${m.id}`;
          d.innerHTML = `<span class="sinum">M${m.id}</span><span class="siname">${m.title}</span><div class="sibar"><div class="sibar-f" style="width:${pct}%"></div></div><span class="sipct">${pct}%</span>`;
          d.onclick = () => {
            scrollToMod(m.id);
            closeSidebar();
          };
          nav.appendChild(d);
        });

        // Atualiza label do toggle
        const wrap = document.getElementById("sib-outros-wrap");
        if (wrap) {
          const count = S.mods.length - (activeMod ? 1 : 0);
          const span = wrap.querySelector(".sib-toggle span");
          if (span) span.textContent = `Outros Módulos (${count})`;
        }
      }

      function updSib(mId) {
        const pct = mpct(
          mId,
          S.mods.find((m) => m.id === mId)?.topics.length || 0,
        );
        // pode haver duas instâncias do id (destaque + lista), update ambas
        document
          .querySelectorAll(`#sib-${mId} .sibar-f`)
          .forEach((el) => (el.style.width = pct + "%"));
        document
          .querySelectorAll(`#sib-${mId} .sipct`)
          .forEach((el) => (el.textContent = pct + "%"));
        // re-renderiza sidebar para atualizar qual módulo está em destaque
        renderSidebar();
      }

        e.currentTarget.classList.add("on");
        document.getElementById(`tp-${mId}-${name}`)?.classList.add("on");
      }

          topics: document
            .getElementById("mTopics")
            .value.split("\n")
            .map((s) => s.trim())
            .filter(Boolean),
          tools: document
            .getElementById("mTools")
            .value.split(",")
            .map((s) => s.trim())
            .filter(Boolean),
          books: document
            .getElementById("mBooks")
            .value.split("\n")
            .map((s) => s.trim())
            .filter(Boolean),
          dod: document
            .getElementById("mDod")
            .value.split("\n")
            .map((s) => s.trim())
            .filter(Boolean),
          dodQuote: null,
        };
        S.mods.push(newM);
        S.mods.sort((a, b) => a.id - b.id);
        saveS();
        closeModal();
        renderAll();
        showToast(`Módulo "${title}" adicionado`);
        [
          "mNum",
          "mTitle",
          "mFocus",
          "mTopics",
          "mTools",
          "mBooks",
          "mDod",
        ].forEach((id) => (document.getElementById(id).value = ""));
      }

      function delMod(mId) {
        if (!confirm("Remover este módulo?")) return;
        S.mods = S.mods.filter((m) => m.id !== mId);
        saveS();
        renderAll();
        showToast("Módulo removido");
      }

      function addTopic(mId) {
        const text = prompt("Nome do novo tópico:");
        if (!text?.trim()) return;
        const mod = S.mods.find((m) => m.id === mId);
        if (!mod) return;
        mod.topics.push(text.trim());
        saveS();
        const grid = document.getElementById(`tg-${mId}`);
        if (grid) {
          const idx = mod.topics.length - 1;
          const tmp = document.createElement("div");
          tmp.innerHTML = trow(mId, idx, mod.topics[idx]);
          grid.appendChild(tmp.firstElementChild);
        }
        updateStats();
        showToast("Tópico adicionado");
      }

      /* ================================================
   SIDEBAR MOBILE
================================================ */
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sibov").classList.toggle("open");
      }
      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sibov").classList.remove("open");
      }
      let _sibOutrosOpen = true;
      function toggleSibOutros() {
        _sibOutrosOpen = !_sibOutrosOpen;
        const nav = document.getElementById("sibnav");
        const btn = document.getElementById("sibToggleBtn");
        if (nav) nav.style.display = _sibOutrosOpen ? "" : "none";
        if (btn) btn.classList.toggle("collapsed", !_sibOutrosOpen);
      }

      /* ================================================
   TOAST
================================================ */
      let _tt;
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(_tt);
        _tt = setTimeout(() => t.classList.remove("show"), 2800);
      }

      /* ================================================
   INIT
================================================ */
      loadS();
      updateStats &&
        renderAll &&
        document.getElementById("app").style.display === "block" &&
        renderAll();
    </script>
  </body>
</html>
